<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SoundSwitch</title>
<style>
  :root {
    --bg: #B8D8D8;
    --panel-bg: #ffffff;
    --teal: #22577A;
    --navy: #22031F;
    --text: #22031F;
    --off-track: #D7E4E2;
    --glow: rgba(34, 87, 122, 0.28);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    padding: 50px 20px;
  }

  .app {
    width: 100%;
    max-width: 400px;
  }

  .app-header {
    margin-bottom: 26px;
  }
  .app-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
  }
  .app-subtitle {
    font-size: 13px;
    color: var(--teal);
    margin-top: 2px;
  }

  .panel-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .spectrogram-placeholder {
    width: 100%;
    height: 120px;
    border-radius: 16px;
    background: var(--panel-bg);
    margin-bottom: 28px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card {
    background: var(--panel-bg);
    border-radius: 18px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid transparent;
  }
  /* Currently-detected category gets a soft teal glow, not a bright/loud
     color -- meant to read as "present" without being visually jarring. */
  .card.detected {
    border-color: var(--glow);
    box-shadow: 0 0 0 4px var(--glow);
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
  }
  .card-meta {
    font-size: 11px;
    color: var(--text);
    opacity: 0.6;
    margin-top: 3px;
  }
  .switch {
    width: 44px;
    height: 26px;
    border-radius: 999px;
    background: var(--teal);
    position: relative;
    flex-shrink: 0;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 3px;
    right: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
  }
  .switch.off {
    background: var(--off-track);
  }
  .switch.off::after {
    right: auto;
    left: 3px;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--teal);
    background: var(--off-track);
    padding: 5px 10px;
    border-radius: 999px;
    flex-shrink: 0;
    text-align: right;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="app-header">
      <div class="app-title">SoundSwitch</div>
      <div class="app-subtitle">live category control</div>
    </div>

    <div class="panel-label">Live Spectrogram</div>
    <div class="spectrogram-placeholder"></div>

    <div class="cards">
      <div class="card">
        <div><div class="card-name">Speech</div><div class="card-meta">direct speech</div></div>
        <div class="switch"></div>
      </div>
      <div class="card">
        <div><div class="card-name">Traffic</div><div class="card-meta">vehicles, horns</div></div>
        <div class="switch off"></div>
      </div>
      <div class="card">
        <div><div class="card-name">Mechanical Hums</div><div class="card-meta">engines, fans</div></div>
        <div class="switch off"></div>
      </div>
      <div class="card">
        <div><div class="card-name">Other</div><div class="card-meta">unclassified sounds</div></div>
        <div class="tag">more coming soon</div>
      </div>
    </div>
  </div>
</body>
</html>
